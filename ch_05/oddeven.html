<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>홀수/짝수</title>
  </head>
  <body>
    <input id="input_number" type="number" />
    <button id="btn" type="button">확인</button>
    <div id="print"></div>
  </body>
</html>

<script>
  document.getElementById("btn").onclick = function () {
    let num = Number(document.getElementById("input_number").value);

    if (Number.isInteger(num)) {
      if (num % 2 === 0) {
        document.getElementById("print").textContent = "짝수";
      } else {
        document.getElementById("print").textContent = "홀수";
      }
    } else {
      document.getElementById("print").textContent = "정수를 입력하쇼";
    }
  };
</script>
